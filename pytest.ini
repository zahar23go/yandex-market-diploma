[pytest]
markers =
    ui: UI tests
    api: API tests
    smoke: Smoke tests
    regression: Regression tests
    slow: Slow tests

addopts = 
    -v
    --strict-markers
    --tb=short
    --alluredir=allure-results

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
